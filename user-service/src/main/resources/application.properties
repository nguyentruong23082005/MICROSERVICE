##### Service details: #####
server.port=${SERVER_PORT:8811}
spring.application.name=user-service
server.url=${SERVER_URL:http://localhost:8811}

#Client registration properties :
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}

#Data source :
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/users}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

#Jpa/Hibernate :
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

##### HTTP #####
# Local development runs on HTTP. Set SECURITY_AUTH_COOKIE_SECURE=true behind HTTPS in production.
security.auth.cookie-secure=${SECURITY_AUTH_COOKIE_SECURE:false}
error.404.schema.details=The resource you are looking for might have been removed, had its name changed, or is temporarily unavailable
error.406.schema.details=This request is not acceptable. Supported MIME types are application/json

##### Redis #####
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

##### Actuator #####
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always

##### Firebase / password reset #####
firebase.config.path=${FIREBASE_CONFIG_PATH:../secrets/firebase-service-account.json}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}
