#Server port :
server.port= 8813

#Application name :
spring.application.name= order-service

#Client registration properties:
eureka.client.service-url.defaultZone = http://localhost:8761/eureka

#Data source :
spring.datasource.url=jdbc:postgresql://localhost:5434/orders
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

#Jpa/Hibernate :
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

#Redis
spring.session.redis.namespace=session
spring.session.store-type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

#Kafka
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=order-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=\
  com.rainbowforest.paymentservice.event.PaymentCompletedEvent:com.rainbowforest.orderservice.event.PaymentCompletedEvent,\
  com.rainbowforest.paymentservice.event.PaymentFailedEvent:com.rainbowforest.orderservice.event.PaymentFailedEvent
app.kafka.topics.order-created=order-created
app.kafka.topics.payment-completed=payment-completed
app.kafka.topics.payment-failed=payment-failed
