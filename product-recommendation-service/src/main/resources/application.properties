#Server port :
server.port=${SERVER_PORT:8814}

#Application name :
spring.application.name=product-recommendation-service

#Client registration properties :
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}

#Data source :
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/product_recommendations}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

#Jpa/Hibernate :
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Actuator
management.endpoints.web.exposure.include=health,metrics,info,prometheus,ratelimiters
management.endpoint.health.show-details=always

# Springdoc
springdoc.api-docs.path=/v3/api-docs

# Redis configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
# Cache TTL: 10 minutes (600000 ms)
spring.cache.redis.time-to-live=600000

# Resilience4j Circuit Breaker for Gemini API
resilience4j.circuitbreaker.configs.default.sliding-window-size=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3

# Gemini API configuration
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-3.1-flash-lite}

