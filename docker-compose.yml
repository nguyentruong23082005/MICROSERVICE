version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecom-postgres
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: ecom-zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ecom-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT_INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
    restart: unless-stopped

  eureka-server:
    build: ./eureka-server
    container_name: ecom-eureka-server
    ports:
      - "8761:8761"
    restart: unless-stopped

  user-service:
    build: ./user-service
    container_name: ecom-user-service
    ports:
      - "8811:8811"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/users
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
    depends_on:
      - postgres
      - eureka-server
    restart: unless-stopped

  product-catalog-service:
    build: ./product-catalog-service
    container_name: ecom-product-catalog-service
    ports:
      - "8812:8812"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/product_catalog
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - postgres
      - kafka
      - eureka-server
    restart: unless-stopped

  product-recommendation-service:
    build: ./product-recommendation-service
    container_name: ecom-product-recommendation-service
    ports:
      - "8814:8814"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/product_recommendations
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
    depends_on:
      - postgres
      - eureka-server
    restart: unless-stopped

  order-service:
    build: ./order-service
    container_name: ecom-order-service
    ports:
      - "8813:8813"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/orders
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - postgres
      - redis
      - kafka
      - eureka-server
    restart: unless-stopped

  payment-service:
    build: ./payment-service
    container_name: ecom-payment-service
    ports:
      - "8815:8815"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/payments
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - postgres
      - kafka
      - eureka-server
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    container_name: ecom-notification-service
    ports:
      - "8816:8816"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/notifications
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - postgres
      - kafka
      - eureka-server
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: ecom-api-gateway
    ports:
      - "8900:8900"
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATA_REDIS_HOST=redis
      - USER_SERVICE_URI=http://user-service:8811
      - PRODUCT_CATALOG_SERVICE_URI=http://product-catalog-service:8812
    depends_on:
      - redis
      - eureka-server
      - user-service
      - product-catalog-service
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ecom-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    restart: unless-stopped
