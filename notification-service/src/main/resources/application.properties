server.port=8816
spring.application.name=notification-service

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# MongoDB
spring.data.mongodb.host=${MONGO_HOST:localhost}
spring.data.mongodb.port=27017
spring.data.mongodb.database=notifications

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=\
  com.rainbowforest.orderservice.event.OrderCreatedEvent:com.rainbowforest.notificationservice.event.OrderCreatedEvent,\
  com.rainbowforest.paymentservice.event.PaymentCompletedEvent:com.rainbowforest.notificationservice.event.PaymentCompletedEvent

app.kafka.topics.payment-completed=payment-completed
app.kafka.topics.order-created=order-created
