server:
  port: 8900

spring:
  application:
    name: api-gateway

  # Redis configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # Default filters applied to ALL routes
      default-filters:
        # Security headers
        - AddResponseHeader=X-Content-Type-Options, nosniff
        - AddResponseHeader=X-Frame-Options, DENY
        - AddResponseHeader=X-XSS-Protection, 1; mode=block
        - AddResponseHeader=Referrer-Policy, strict-origin-when-cross-origin

      routes:
        # ── Sensitive: Login (20 req/min per IP) ──────────────────────────────
        - id: user-service-login
          uri: ${USER_SERVICE_URI:lb://user-service}
          predicates:
            - Path=/api/accounts/auth/login
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@sensitiveRedisRateLimiter}"
                key-resolver: "#{@sensitiveKeyResolver}"
                deny-empty-key: true

        # ── Sensitive: Registration (20 req/min per IP) ───────────────────────
        - id: user-service-register
          uri: ${USER_SERVICE_URI:lb://user-service}
          predicates:
            - Path=/api/accounts/auth/registration
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@sensitiveRedisRateLimiter}"
                key-resolver: "#{@sensitiveKeyResolver}"
                deny-empty-key: true

        # ── Sensitive: Checkout / Place Order (20 req/min per IP) ────────────
        - id: order-service-checkout
          uri: ${ORDER_SERVICE_URI:lb://order-service}
          predicates:
            - Path=/api/shop/order/**
            - Method=POST
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@sensitiveRedisRateLimiter}"
                key-resolver: "#{@sensitiveKeyResolver}"
                deny-empty-key: true

        # ── General: User Service (100 req/min) ───────────────────────────────
        - id: user-service
          uri: ${USER_SERVICE_URI:lb://user-service}
          predicates:
            - Path=/api/accounts/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@globalRedisRateLimiter}"
                key-resolver: "#{@globalKeyResolver}"
                deny-empty-key: false

        # ── General: Product Catalog Service (100 req/min) ────────────────────
        - id: product-catalog-service
          uri: ${PRODUCT_CATALOG_SERVICE_URI:lb://product-catalog-service}
          predicates:
            - Path=/api/catalog/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@globalRedisRateLimiter}"
                key-resolver: "#{@globalKeyResolver}"
                deny-empty-key: false

        # ── General: Order Service (100 req/min) ──────────────────────────────
        - id: order-service
          uri: ${ORDER_SERVICE_URI:lb://order-service}
          predicates:
            - Path=/api/shop/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@globalRedisRateLimiter}"
                key-resolver: "#{@globalKeyResolver}"
                deny-empty-key: false

        # ── General: Payment Service (100 req/min) ────────────────────────────
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URI:lb://payment-service}
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@globalRedisRateLimiter}"
                key-resolver: "#{@globalKeyResolver}"
                deny-empty-key: false

        # ── General: Notification Service (100 req/min) ───────────────────────
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URI:lb://notification-service}
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@globalRedisRateLimiter}"
                key-resolver: "#{@globalKeyResolver}"
                deny-empty-key: false

        # ── General: Product Recommendation Service (100 req/min) ─────────────
        - id: product-recommendation-service
          uri: ${PRODUCT_RECOMMENDATION_SERVICE_URI:lb://product-recommendation-service}
          predicates:
            - Path=/api/review/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@globalRedisRateLimiter}"
                key-resolver: "#{@globalKeyResolver}"
                deny-empty-key: false


app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:4200,http://localhost:*,http://127.0.0.1:*}

# Eureka client
eureka:
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always

# Springdoc OpenAPI Aggregation — all 6 services
springdoc:
  swagger-ui:
    urls:
      - name: User Service
        url: /api/accounts/v3/api-docs
      - name: Product Catalog Service
        url: /api/catalog/v3/api-docs
      - name: Order Service
        url: /api/shop/v3/api-docs
      - name: Payment Service
        url: /api/payments/v3/api-docs
      - name: Notification Service
        url: /api/notifications/v3/api-docs
      - name: Recommendation Service
        url: /api/review/v3/api-docs
